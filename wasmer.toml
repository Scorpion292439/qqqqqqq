[package]
name = "python-js-hosting"
version = "1.0.0"
description = "Python & JavaScript Hosting Platform"

[[command]]
name = "web"
module = "main"
runner = "https://wasmer.sh/python"

[module]
name = "main"
source = "."
abi = "wasi"

[[fs]]
source = "uploads"
destination = "/uploads"

[[fs]]
source = "templates"
destination = "/templates"

[[fs]]
source = "static"
destination = "/static"

[env]
PYTHONUNBUFFERED = "1"
